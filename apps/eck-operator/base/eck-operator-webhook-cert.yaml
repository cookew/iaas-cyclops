apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eck-operator-webhook-cert
spec:
  commonName: eck-operator-webhook-cert
  dnsNames:
    - elastic-webhook-server.eck-operator.svc
  duration: 960h
  isCA: false
  issuerRef:
    kind: ClusterIssuer
    name: iaas-wcooke-me
  secretName: eck-operator-webhook-cert
  usages:
  - client auth
  - server auth
