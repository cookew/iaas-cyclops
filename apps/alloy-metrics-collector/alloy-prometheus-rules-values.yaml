# https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy

alloy:
  configMap:
    content: |-
      logging {
        format = "json"
        level  = "info"
      }

      livedebugging {
        enabled = false
      }




      // Prometheus Alerts
      mimir.rules.kubernetes "local" {
        address = "http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc:9090"
        prometheus_http_prefix = "/api/v1/rules"
        use_legacy_routes = true
      }
      // End Prometheus Alerts




  # clustering:
  #   enabled: true
  #   name: kube-cluster

  enableReporting: false

  envFrom: []

  extraArgs: []

  extraEnv: []

  # extraPorts:
  # - name: alloy-client
  #   port: 4400
  #   targetPort: 4400

  # listenAddr: 127.0.0.1

  listenScheme: HTTP

  mounts:
    extra:
    # - mountPath: /storage
    #   name: storage
    # - name: client-ca-cert
    #   mountPath: "/client-ca-cert"
    #   readOnly: true
    varlog: false

  resources:
    requests:
      cpu: 333m

  storagePath: /storage

controller:
  enableStatefulSetAutoDeletePVC: true

  podDisruptionBudget:
    enabled: false
    # maxUnavailable: 2

  replicas: 1

  revisionHistoryLimit: 0

  # tolerations:
  # - effect: NoSchedule
  #   key: node-role.kubernetes.io/control-plane
  # - effect: NoExecute
  #   key: node.kubernetes.io/not-ready
  #   operator: Exists
  # - effect: NoExecute
  #   key: node.kubernetes.io/unreachable
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/disk-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/memory-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/pid-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/unschedulable
  #   operator: Exists

  # Must be one of 'daemonset', 'deployment', or 'statefulset'.
  type: deployment

  # volumeClaimTemplates:
  # - apiVersion: v1
  #   kind: PersistentVolumeClaim
  #   metadata:
  #     name: storage
  #   spec:
  #     accessModes: [ "ReadWriteOnce" ]
  #     resources:
  #       requests:
  #         storage: 10Gi
  #     storageClassName: ceph-filesystem

  # volumes:
  #   extra:
  #   - name: client-ca-cert
  #     secret:
  #       secretName: alloy-client-ca-cert

crds:
  create: false

serviceMonitor:
  enabled: true
