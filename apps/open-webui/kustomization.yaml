apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: open-webui

resources:
- base/open-webui-keycloak-client.yaml
- base/open-webui-pg-cluster.yaml
- sealed-secrets/open-webui-keycloak-client.yaml

helmCharts:
- name: open-webui
  namespace: open-webui
  releaseName: open-webui
  repo: https://helm.openwebui.com
  version: 12.13.0
  valuesFile: values.yaml
