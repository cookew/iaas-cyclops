config:
  # https://docs.fluentbit.io/manual/pipeline/outputs/loki
  inputs: |
    [INPUT]
      Name tail
      # Buffer_Chunk_Size 64KB
      Buffer_Max_Size   512KB
      DB                /var/log/flb_kube.db
      DB.locking        true
      Mem_Buf_Limit     10MB
      multiline.parser  cri
      Path              /var/log/containers/*.log
      Skip_Long_Lines   On
      Tag               kube.*

    # [INPUT]
    #   Name systemd
    #   Read_From_Tail On
    #   Systemd_Filter _SYSTEMD_UNIT=kubelet.service
    #   Tag host.*

  filters: |
    [FILTER]
      Name                kubernetes
      Buffer_Size         32KB
      Keep_Log            Off
      Match               kube.*
      Merge_Log           On
      K8S-Logging.Exclude On
      K8S-Logging.Parser  On
      Kube_Meta_Cache_TTL 300s

    # [FILTER]
    #   Name         modify
    #   Match        kube.*
    #   Remove       controller_revision_hash
    #   Remove       pod_template_generation
    #   Remove       pod_template_hash

    # Filter: Exclude health check logs (they are too noisy)
    # [FILTER]
    #   Name          grep
    #   Match         kube.*
    #   # Exclude lines containing health check paths
    #   Exclude       log /healthz|/readyz|/livez/


    # [FILTER]
    #   name         nest
    #   match        kube.*
    #   operation    lift
    #   nested_under kubernetes
    #   add_prefix   kubernetes_

    # [FILTER]
    #   name         nest
    #   match        kube.*
    #   operation    lift
    #   nested_under kubernetes_annotations
    #   add_prefix   kubernetes_annotations_

    # [FILTER]
    #   Name                modify
    #   Match               kube.*
    #   Remove              kubernetes_annotations_k8s.ovn.org/pod-networks
    #   Remove              kubernetes_annotations_k8s.v1.cni.cncf.io/network-status

  outputs: |
    [OUTPUT]
      # auto_kubernetes_labels on
      # bearer_token
      host loki-distributor.loki.svc
      # http_user loki
      # http_passwd loki
      labels cluster=iaas, namespace=$kubernetes['namespace_name'], service_name=$kubernetes['container_name'], source=kubernetes
      match *
      name loki
      # tls on
      # Remove_keys  pod_template_generation, pod_template_hash, controller_revision_hash

  service: |
    [SERVICE]
      Daemon Off
      Flush {{ .Values.flush }}
      Log_Level {{ .Values.logLevel }}
      Parsers_File /fluent-bit/etc/parsers.conf
      Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port {{ .Values.metricsPort }}
      Health_Check On
      storage.type memory
      storage.max_chunks_up 1024

dashboards:
  enabled: true

resources:
  limits:
    cpu: 250m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 200Mi

securityContext:
  privileged: true

serviceMonitor:
  enabled: true

tolerations:
- key: node-role.kubernetes.io/control-plane
  effect: NoSchedule
