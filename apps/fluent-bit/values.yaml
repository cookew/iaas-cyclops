config:
  # https://docs.fluentbit.io/manual/pipeline/outputs/loki
  inputs: |
    [INPUT]
      Name tail
      Path              /var/log/containers/*.log
      multiline.parser  cri
      Tag               kube.*
      Mem_Buf_Limit     32MB
      Skip_Long_Lines   On
      # Buffer_Chunk_Size 64KB
      # Buffer_Max_Size   128KB
      # DB                /var/log/flb_kube.db

    # [INPUT]
    #   Name systemd
    #   Tag host.*
    #   Systemd_Filter _SYSTEMD_UNIT=kubelet.service
    #   Read_From_Tail On

  filters: |
    [FILTER]
      Name                kubernetes
      Match               kube.*
      Merge_Log           On
      # Keep_Log            Off
      K8S-Logging.Parser  On
      # K8S-Logging.Exclude On
      # Buffer_Size         256KB
      Kube_Meta_Cache_TTL 300s

    # [FILTER]
    #   Name         modify
    #   Match        *
    #   Remove       pod_template_hash
    #   Remove       controller_revision_hash

    # [FILTER]
    #   name         nest
    #   match        kube.*
    #   operation    lift
    #   nested_under kubernetes
    #   add_prefix   kubernetes_

    # [FILTER]
    #   name         nest
    #   match        kube.*
    #   operation    lift
    #   nested_under kubernetes_annotations
    #   add_prefix   kubernetes_annotations_

    # [FILTER]
    #   Name                modify
    #   Match               kube.*
    #   Remove              kubernetes_annotations_k8s.ovn.org/pod-networks
    #   Remove              kubernetes_annotations_k8s.v1.cni.cncf.io/network-status

  outputs: |
    [OUTPUT]
      auto_kubernetes_labels on
      # bearer_token
      host loki-distributor.loki.svc
      # http_user loki
      # http_passwd loki
      labels cluster=iaas, namespace=$kubernetes['namespace_name'], source=kubernetes
      match *
      name loki
      # tls on
      Remove_keys  pod_template_generation, pod_template_hash, controller_revision_hash

    # [OUTPUT]
    #   auto_kubernetes_labels on
    #   # bearer_token
    #   host alloy.alloy.svc
    #   # http_user loki
    #   # http_passwd loki
    #   labels cluster=iaas, namespace=$kubernetes['namespace_name'], source=kubernetes
    #   match *
    #   name loki
    #   # tls on

  service: |
    [SERVICE]
      Daemon Off
      Flush {{ .Values.flush }}
      Log_Level {{ .Values.logLevel }}
      Parsers_File /fluent-bit/etc/parsers.conf
      Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port {{ .Values.metricsPort }}
      Health_Check On
      storage.type memory
      storage.max_chunks_up 1024

dashboards:
  enabled: true

resources:
  limits:
    cpu: 250m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 200Mi

securityContext:
  privileged: true

serviceMonitor:
  enabled: true

tolerations:
- key: node-role.kubernetes.io/control-plane
  effect: NoSchedule
