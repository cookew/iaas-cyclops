  #     secretName: ceph-objectstore-tls
  storageClass:
    annotations: {}
    enabled: true
    labels: {}
    name: ceph-bucket
    parameters:
      region: us-east-1
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
