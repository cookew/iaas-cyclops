# https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml

cephClusterSpec:
  cephConfig:
    global:
      mon_max_pg_per_osd: "512"
      mon_cluster_log_level: "info"
      clog_to_monitors: "0/0"
      debug_asok: "0/0"
      debug_auth: "0/0"
      debug_bdev: "0/0"
      debug_bluefs: "0/0"
      debug_bluestore: "0/0"
      debug_bluestore_compression: "0/0"
      debug_ceph_exporter: "0/0"
      debug_compressor: "0/0"
      debug_crush: "0/0"
      debug_crypto: "0/0"
      debug_dpdk: "0/0"
      # debug_eventtracer: "0/0"
      debug_filestore: "0/0"
      debug_finisher: "0/0"
      debug_fuse: "0/0"
      debug_heartbeatmap: "0/0"
      debug_javaclient: "0/0"
      debug_journal: "0/0"
      debug_kstore: "0/0"
      debug_mclock: "0/0"
      debug_mds_log: "0/0"
      # debug_mds_log_expirer: "0/0"
      debug_mds_migrator: "0/0"
      debug_mds_quiesce: "0/0"
      debug_memstore: "0/0"
      debug_mgr: "0/0"
      debug_mgrc: "0/0"
      debug_mon: "0/0"
      debug_osd: "0/0"
      debug_paxos: "0/0"
      debug_perfcounter: "0/0"
      debug_prioritycache: "0/0"
      debug_reserver: "0/0"
      debug_rgw: "0/0"
      debug_rgw_access: "0/0"
      debug_rgw_datacache: "0/0"
      debug_rgw_dbstore: "0/0"
      debug_rgw_dedup: "0/0"
      debug_rgw_flight: "0/0"
      debug_rgw_lifecycle: "0/0"
      debug_rgw_notification: "0/0"
      debug_rgw_restore: "0/0"
      debug_rgw_sync: "0/0"
      debug_rocksdb: "0/0"
      debug_throttle: "0/0"
      debug_trace: "0/0"
    mgr:
      mgr/dashboard/ALERTMANAGER_API_HOST: http://kube-prometheus-stack-alertmanager.kube-prometheus-stack.svc:9093
      mgr/dashboard/ALERTMANAGER_API_SSL_VERIFY: "true"
      # mgr/dashboard/GRAFANA_API_PASSWORD:
      mgr/dashboard/GRAFANA_API_SSL_VERIFY: "false"
      mgr/dashboard/GRAFANA_API_URL: http://grafana.grafana.svc
      mgr/dashboard/GRAFANA_API_USERNAME: ceph-dashboard
      mgr/dashboard/GRAFANA_FRONTEND_API_URL: https://grafana.apps.iaas.wcooke.me
      mgr/dashboard/GRAFANA_UPDATE_DASHBOARDS: "true"
    mon:
      mon_allow_pool_delete: "true"
    client.rgw:
      rgw_gc_max_concurrent_io: "1000"
      rgw_gc_max_trim_chunk: "1024"
  cephConfigFromSecret:
    mgr:
      mgr/dashboard/GRAFANA_API_PASSWORD:
        key: password                     # key of the secret value in Kubernetes secret.Data map[string]string
        name: grafana-ceph-dashboard-user # name of the Kubernetes secret
  crashCollector:
    disable: true
  dashboard:
    # port: 8443
    prometheusEndpoint: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc:9090
    # prometheusEndpoint: http://prometheus-operated.kube-prometheus-stack.svc:9090
    #prometheusEndpoint: http://mimir-distributed-nginx.mimir-distributed.svc/prometheus
    #prometheusEndpointSSLVerify: true
    ssl: false
    urlPrefix: /
  mgr:
    modules:
    - name: rook
      enabled: true
  network:
    connections:
      encryption:
        enabled: false
      compression:
        enabled: false
      requireMsgr2: false
  # resources:
    # mgr:
    #   limits:
    #     memory: 4Gi
    #   requests:
    #     cpu: "500m"
    #     memory: "512Mi"
    # mon:
    #   limits:
    #     memory: "2Gi"
    #   requests:
    #     cpu: "1000m"
    #     memory: "1Gi"
    # osd:
    #   limits:
    #     memory: 8Gi
    #     cpu: 2
    #   requests:
    #     cpu: 2
    #     memory: 8Gi
    # prepareosd:
      # limits: It is not recommended to set limits on the OSD prepare job
      #         since it's a one-time burst for memory that must be allowed to
      #         complete without an OOM kill.  Note however that if a k8s
      #         limitRange guardrail is defined external to Rook, the lack of
      #         a limit here may result in a sync failure, in which case a
      #         limit should be added.  1200Mi may suffice for up to 15Ti
      #         OSDs ; for larger devices 2Gi may be required.
      #         cf. https://github.com/rook/rook/pull/11103
    #   requests:
    #     cpu: "500m"
    #     memory: "50Mi"
    # mgr-sidecar:
    #   limits:
    #     memory: "100Mi"
    #   requests:
    #     cpu: "100m"
    #     memory: "40Mi"
    # crashcollector:
    #   limits:
    #     memory: "60Mi"
    #   requests:
    #     cpu: "100m"
    #     memory: "60Mi"
    # logcollector:
    #   limits:
    #     memory: "1Gi"
    #   requests:
    #     cpu: "100m"
    #     memory: "100Mi"
    # cleanup:
    #   limits:
    #     memory: "1Gi"
    #   requests:
    #     cpu: "500m"
    #     memory: "100Mi"
    # exporter:
    #   limits:
    #     memory: "128Mi"
    #   requests:
    #     cpu: "50m"
    #     memory: "50Mi"
  storage:
    nearFullRatio: 0.67
    useAllNodes: false
    useAllDevices: false
    nodes:
    - name: amd64-1
      devices:
      - name: /dev/disk/by-path/pci-0000:16:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:17:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:8e:00.0-nvme-1
        config:
          deviceClass: nvme
    - name: amd64-2
      devices:
      - name: /dev/disk/by-path/pci-0000:16:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:17:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:01:00.0-nvme-1
        config:
          deviceClass: nvme
    - name: amd64-3
      devices:
      - name: /dev/disk/by-path/pci-0000:17:00.0-nvme-1
        config:
          deviceClass: nvme
      - name: /dev/disk/by-path/pci-0000:b3:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:b4:00.0-nvme-1
        config:
          deviceClass: ssd
    - name: amd64-4
      devices:
      - name: /dev/disk/by-path/pci-0000:06:00.0-nvme-1
        config:
          deviceClass: ssd
      - name: /dev/disk/by-path/pci-0000:17:00.0-nvme-1
        config:
          deviceClass: ssd
      # - name: /dev/disk/by-path/pci-0000:b3:00.0-nvme-1
      #   config:
      #     deviceClass: nvme
  upgradeOSDRequiresHealthyPGs: true

ingress:
  dashboard:
    # labels:
    #   external-dns/private: "true"
    annotations:
      cert-manager.io/cluster-issuer: iaas-wcooke-me
    #   external-dns.alpha.kubernetes.io/hostname: dashboard.example.com
    #   nginx.ingress.kubernetes.io/rewrite-target: /ceph-dashboard/$2
    # If the dashboard has ssl: true the following will make sure the NGINX Ingress controller can expose the dashboard correctly
    #  nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    #  nginx.ingress.kubernetes.io/server-snippet: |
    #    proxy_ssl_verify off;
      forecastle.stakater.com/appName: Ceph
      forecastle.stakater.com/expose: "true"
      forecastle.stakater.com/group: Kubernetes
      forecastle.stakater.com/icon: https://ceph.apps.iaas.wcooke.me/assets/Ceph_Logo.svg
      forecastle.stakater.com/network-restricted: "true"
    host:
      name: ceph.apps.iaas.wcooke.me
      path: /
      pathType: Prefix
    ingressClassName: cilium
    tls:
    - hosts:
      - ceph.apps.iaas.wcooke.me
      secretName: rook-ceph-ingress-certs

monitoring:
  createPrometheusRules: true
  enabled: true

toolbox:
  enabled: true

cephBlockPools: []

cephFileSystems:
- name: ceph-filesystem
  spec:
    dataPools:
    - deviceClass: ssd
      failureDomain: host
      name: data0
      replicated:
        size: 3
    metadataPool:
      deviceClass: ssd
      replicated:
        size: 3
    metadataServer:
      activeCount: 1
      activeStandby: true
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: 1000m
          memory: 4Gi
      priorityClassName: system-cluster-critical
      placement:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rook-ceph-mds
              topologyKey: kubernetes.io/hostname
  storageClass:
    allowVolumeExpansion: true
    annotations: {}
    enabled: true
    isDefault: true
    labels: {}
    mountOptions: []
    name: ceph-filesystem
    pool: data0
    reclaimPolicy: Delete
    parameters:
      csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
      csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/fstype: ext4
    volumeBindingMode: Immediate
- name: cyclops-fs
  spec:
    dataPools:
    - deviceClass: nvme
      failureDomain: host
      name: data0
      replicated:
        size: 3
    metadataPool:
      deviceClass: nvme
      replicated:
        size: 3
    metadataServer:
      activeCount: 1
      activeStandby: true
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: 1000m
          memory: 4Gi
      priorityClassName: system-cluster-critical
      placement:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rook-ceph-mds
              topologyKey: kubernetes.io/hostname
  storageClass:
    allowVolumeExpansion: true
    annotations: {}
    enabled: true
    isDefault: true
    labels: {}
    mountOptions: []
    name: cyclops-fs
    pool: data0
    reclaimPolicy: Delete
    parameters:
      csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
      csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
      csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
      csi.storage.k8s.io/fstype: ext4
    volumeBindingMode: Immediate

cephBlockPoolsVolumeSnapshotClass:
  annotations: {}
  deletionPolicy: Delete
  enabled: true
  isDefault: true
  labels: {}
  name: ceph-block-snapshot
  parameters: {}

cephFileSystemVolumeSnapshotClass:
  annotations: {}
  deletionPolicy: Delete
  enabled: true
  isDefault: false
  labels: {}
  name: ceph-filesystem-snapshot
  parameters: {}

cephECBlockPools:
- name: ceph-block
  spec:
    dataPool:
      deviceClass: ssd
      erasureCoded:
        dataChunks: 2
        codingChunks: 1
      failureDomain: host
    enableRBDStats: true
    # parameters:
    #   # Enable this with ceph tentacle, v20
    #   allow_ec_optimizations: "true"
    metadataPool:
      deviceClass: ssd
      replicated:
        size: 3
  parameters:
    clusterID: rook-ceph-cluster
    imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
    imageFormat: "2"
  storageClass:
    allowVolumeExpansion: true
    # annotations:
    #   storageclass.kubevirt.io/is-default-virt-class: "true"
    enabled: true
    isDefault: false
    mapOptions: "krbd:rxbounce"
    mounter: rbd
    name: ceph-block
    reclaimPolicy: Delete

- name: cyclops-block
  spec:
    dataPool:
      deviceClass: nvme
      erasureCoded:
        dataChunks: 2
        codingChunks: 1
      failureDomain: host
    enableRBDStats: true
    metadataPool:
      deviceClass: nvme
      replicated:
        size: 3
    # parameters:
    #   # Enable this with ceph tentacle, v20
    #   allow_ec_optimizations: "true"
  parameters:
    clusterID: rook-ceph-cluster
    imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
    imageFormat: "2"
  storageClass:
    allowVolumeExpansion: true
    annotations:
      storageclass.kubevirt.io/is-default-virt-class: "true"
    enabled: true
    isDefault: false
    mapOptions: "krbd:rxbounce"
    mounter: rbd
    name: cyclops-block
    reclaimPolicy: Delete

cephObjectStores:
- name: ceph-objectstore
  spec:
    allowUsersInNamespaces:
    - "*"
    dataPool:
      deviceClass: ssd
      erasureCoded:
        dataChunks: 2
        codingChunks: 1
      failureDomain: host
      parameters:
        allow_ec_optimizations: "true"
        bulk: "true"
    gateway:
      # annotations:
      # caBundleRef: ca-bundle-secret
      instances: 2
      opsLogSidecar:
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 40Mi
      # placement:
      port: 80
      priorityClassName: system-cluster-critical
      resources:
        limits:
          cpu: 2000m
        requests:
          cpu: 1000m
          memory: 1Gi
      securePort: 443
      sslCertificateRef: objectstore-certificate
    hosting:
      advertiseEndpoint:
        dnsName: rook-ceph-rgw-ceph-objectstore.rook-ceph-cluster.svc
        port: 443
        useTls: true
      dnsNames:
      - rook-ceph-rgw-ceph-objectstore.rook-ceph-cluster.svc.cluster.local
      - s3.apps.iaas.wcooke.me
    metadataPool:
      deviceClass: ssd
      failureDomain: host
      replicated:
        size: 3
    preservePoolsOnDelete: false
  # ingress:
  #   annotations:
  #     cert-manager.io/cluster-issuer: iaas-wcooke-me
  #     # route.openshift.io/termination: reencrypt
  #   enabled: true
  #   host:
