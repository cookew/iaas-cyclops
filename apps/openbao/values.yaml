# https://github.com/openbao/openbao-helm/blob/main/charts/openbao/values.yaml

global:
  # -- TLS for end-to-end encrypted transport
  # tlsDisable: true

  # -- Create PodSecurityPolicy for pods
  psp:
    enable: false

  serverTelemetry:
    prometheusOperator: true

injector:
  metrics:
    enabled: true
  logFormat: "json"
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 1
  strategy: |
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate

server:
  auditStorage:
    enabled: true
    storageClass: ceph-filesystem
  dataStorage:
    storageClass: ceph-filesystem
  ha:
    enabled: true
    raft:
      config: |
        api_addr = "https://openbao.apps.iaas.wcooke.me"
        cluster_name = "iaas-openbao"
        ui = true

        audit "file" "to-stdout" {
          description = "This audit device should never fail."
          options {
            file_path = "/dev/stdout"
            log_raw = "false"
          }
        }

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        seal "static" {
          current_key_id = "20260510-1"
          current_key = "file:///openbao/secrets/seal-key"
        }

        service_registration "kubernetes" {}

        storage "raft" {
          path = "/openbao/data"
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }
      enabled: true
      setNodeId: true
  ingress:
    activeService: true
    annotations:
      cert-manager.io/cluster-issuer: iaas-wcooke-me
      forecastle.stakater.com/appName: OpenBAO
      forecastle.stakater.com/expose: "true"
      forecastle.stakater.com/group: Apps
      forecastle.stakater.com/icon: https://openbao.apps.iaas.wcooke.me/ui/favicon.svg
      forecastle.stakater.com/network-restricted: "true"
    enabled: true
    hosts:
    - host: openbao.apps.iaas.wcooke.me
    ingressClassName: cilium
    pathType: Prefix
    tls:
    - secretName: openbao-ingress-tls
      hosts:
      - openbao.apps.iaas.wcooke.me
  logLevel: info
  logFormat: json
  updateStrategyType: "RollingUpdate"
  volumes:
  - name: seal-key
    secret:
      secretName: seal-key
  - configMap:
      defaultMode: 420
      name: ca-all
    name: ca
  volumeMounts:
  - name: seal-key
    mountPath: /openbao/secrets/seal-key
    subPath: seal-key
  - mountPath: /etc/ssl/certs/ca-certificates.crt
    name: ca
    readOnly: true
    subPath: ca-certificates.crt

serverTelemetry:
  grafanaDashboard:
    enabled: true
  prometheusRules:
    enabled: true
  serviceMonitor:
    enabled: true

ui:
  activeOpenbaoPodOnly: true
  enabled: true
  publishNotReadyAddresses: true

# openbao-csi-provider
csi:
  # -- True if you want to install an openbao-csi-provider daemonset.
  #
  # Requires installing the secrets-store-csi-driver separately, see:
  # https://secrets-store-csi-driver.sigs.k8s.io/getting-started/installation
  #
  # With the driver and provider installed, you can mount OpenBao secrets into volumes
  # similar to the OpenBao Agent injector, and you can also sync those secrets into
  # Kubernetes secrets.
  enabled: false

  # -- volumes is a list of volumes made available to all containers. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumes: []
  # - name: tls
  #   secret:
  #     secretName: openbao-tls

  # -- volumeMounts is a list of volumeMounts for the main server container. These are rendered
  # via toYaml rather than pre-processed like the extraVolumes value.
  # The purpose is to make it easy to share volumes between containers.
  volumeMounts: []
  # - name: tls
  #   mountPath: "/openbao/tls"
  #   readOnly: true

  serviceMonitor:
    enabled: true

  prometheusRules:
    enabled: true

  grafanaDashboard:
    enabled: true

snapshotAgent:
  enabled: false
  s3CredentialsSecret: openbao-agent-bucket

  config:
    baoAuthPath: kubernetes
    baoRole: snapshot
    s3Bucket: openbao-snapshots
    s3cmdExtraFlag: -v
    s3ExpireDays: "14"
    s3Host: s3.eu-east-1.amazonaws.com
    s3Uri: s3://openbao-snapshots

  # -- Map of extra environment variables to set in the snapshot-agent cronjob
  extraEnvironmentVars: {}
    # BAO_CACERT: /openbao/tls/ca.crt

  # --  List of extra environment variables to set in the snapshot-agent cronjob
  # These variables take value from existing Secret objects.
  extraSecretEnvironmentVars: []
    # - envName: AWS_SECRET_ACCESS_KEY
    #   secretName: openbao
    #   secretKey: AWS_SECRET_ACCESS_KEY
