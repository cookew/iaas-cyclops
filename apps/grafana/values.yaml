# https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml

admin:
  existingSecret: grafana-admin

# extraConfigmapMounts:
# - name: ca-bundle
#   configMap: tm-ca-bundle
#   mountPath: /ca-bundle
#   optional: false
#   readOnly: true

extraSecretMounts:
- name: grafana-pg-cluster-app
  mountPath: /grafana-pg-cluster-app
  optional: false
  secretName: grafana-pg-cluster-app
  readOnly: true
- name: grafana-keycloak-client
  mountPath: /grafana-keycloak-client
  optional: false
  secretName: grafana-keycloak-client
  readOnly: true
- name: secret-key
  mountPath: /grafana-secret-key
  optional: false
  secretName: grafana-secret-key
  readOnly: true
- name: grafana-valkey-password
  mountPath: /grafana-valkey-password
  optional: false
  secretName: grafana-valkey-password
  readOnly: true
- name: grafana-external-image
  mountPath: /grafana-external-image
  optional: false
  secretName: grafana-external-image-bucket
  readOnly: true

extraVolumeMounts:
- name: ca-certificates
  mountPath: /etc/ssl/certs

extraVolumes:
- name: ca-certificates
  configMap:
    name: ca-all
    # items:
    # - key: ca-certificates.crt

grafana.ini:
  alerting:
    ha_redis_address: valkey.grafana.svc:6379
    ha_redis_password: "$__file{/grafana-valkey-password/REDIS_PASSWORD}"
    # ha_redis_db: 0
  analytics:
    enabled: false
    check_for_plugin_updates: false
    check_for_updates: false
    feedback_links_enabled: false
    reporting_enabled: false
  auth:
    disable_login_form: true
    login_maximum_inactive_lifetime_duration: 15m
    signout_redirect_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fforecastle.apps.iaas.wcooke.me
  auth.anonymous:
    hide_version: true
  auth.basic:
    password_policy: true
  auth.generic_oauth:
    allow_assign_grafana_admin: true
    allow_sign_up: true
    api_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/userinfo
    auth_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/auth
    auto_login: true
    client_id: "$__file{/grafana-keycloak-client/client-id}"
    client_secret: "$__file{/grafana-keycloak-client/client-secret}"
    email_attribute_path: email
    enabled: true
    # groups_attribute_path: groups
    jwk_set_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/certs
    login_attribute_path: preferred_username
    name_attribute_path: name
    name: Keycloak
    # role_attribute_path: contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'
    role_attribute_path: contains(resource_access.grafana.roles[*], 'grafana-server-admin') && 'GrafanaAdmin' || contains(resource_access.grafana.roles[*], 'grafana-admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'grafana-editor') && 'Editor' || contains(resource_access.grafana.roles[*], 'grafana-viewer') && 'Viewer'
    role_attribute_strict: true
    scopes: openid email profile offline_access roles
    signout_redirect_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fforecastle.apps.iaas.wcooke.me
    # tls_client_ca: /ca-bundle/ca-bundle.pem
    token_url: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/token
    use_pkce: true
    use_refresh_token: true
    validate_id_token: true
  auth.security:
    protected_roles: server_admins
  database:
    host: "$__file{/grafana-pg-cluster-app/host}:$__file{/grafana-pg-cluster-app/port}"
    name: "$__file{/grafana-pg-cluster-app/dbname}"
    password: "$__file{/grafana-pg-cluster-app/password}"
    type: postgres
    user: "$__file{/grafana-pg-cluster-app/user}"
  external_image_storage.s3:
    access_key: "$__file{/grafana-external-image/AWS_ACCESS_KEY_ID}"
    bucket: grafana-external-image
    bucket_url: https://rook-ceph-rgw-ceph-objectstore.rook-ceph-cluster.svc
    path_style_access: true
    region: us-east-1
    secret_key: "$__file{/grafana-external-image/AWS_SECRET_ACCESS_KEY}"
  feature_toggles:
    grafanaAdvisor: true
    provisioning: true
    kubernetesClientDashboardsFolders: true
    kubernetesDashboards: true # use k8s from browser
    # If you want easy kubectl setup development mode
    grafanaAPIServerEnsureKubectlAccess: true
  grafana_net:
    url: https://grafana.net
  help:
    enabled: false
  live:
    ha_engine: redis
    ha_engine_address: valkey.grafana.svc:6379
    ha_engine_password: "$__file{/grafana-valkey-password/REDIS_PASSWORD}"
  news:
    news_feed_enabled: false
  plugins:
    plugin_admin_enabled: false
    # preinstall_auto_update: false
    # public_key_retrieval_disabled: true
  remote_cache:
    connstr: redis=network=tcp,addr=valkey.grafana.svc:6379,pool_size=100,db=0,password=$__file{/grafana-valkey-password/REDIS_PASSWORD},ssl=false
    encryption: true
    type: redis
  security:
    allow_embedding: true
    content_security_policy: true
    cookie_samesite: strict
    cookie_secure: true
    # csrf_always_check:
    # csrf_trusted_origins:
    disable_gravatar: true
    strict_transport_security: true
    strict_transport_security_preload: true
    secret_key: "$__file{/grafana-secret-key/secret_key}"
  server:
    enforce_domain: true
    root_url: https://grafana.apps.iaas.wcooke.me
    min_tls_version: "1.3"
  snapshots:
    enabled: false

ingress:
  annotations:
    cert-manager.io/cluster-issuer: iaas-wcooke-me
    forecastle.stakater.com/appName: Grafana
    forecastle.stakater.com/expose: "true"
    forecastle.stakater.com/group: Observability
    forecastle.stakater.com/icon: https://grafana.apps.iaas.wcooke.me/public/img/grafana_icon.svg
    forecastle.stakater.com/network-restricted: "true"
  enabled: true
  hosts:
  - grafana.apps.iaas.wcooke.me
  ingressClassName: cilium
  tls:
  - hosts:
    - grafana.apps.iaas.wcooke.me
    secretName: grafana-ingress-tls

imageRenderer:
  enabled: true
  revisionHistoryLimit: 0
  serviceMonitor:
    enabled: true

initChownData:
  resources:
    limits:
      cpu: 100m
      memory: 32Mi
    requests:
      cpu: 50m
      memory: 16Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: grafana
    httpHeaders:
    - name: Host
      value: grafana.apps.iaas.wcooke.me
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10

# plugins:
# - grafana-lokioperational-app

replicas: 2

resources:
  limits:
    cpu: 1000m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

revisionHistoryLimit: 0

serviceMonitorSelector:
  enabled: true

sidecar:
  alerts:
    enabled: true
    extraMounts:
    - name: ca-certificates
      mountPath: /etc/ssl/certs
    searchNamespace: ALL
  dashboards:
    enabled: true
    extraMounts:
    - name: ca-certificates
      mountPath: /etc/ssl/certs
    searchNamespace: ALL
  datasources:
    enabled: true
    extraMounts:
    - name: ca-certificates
      mountPath: /etc/ssl/certs
    searchNamespace: ALL
  notifiers:
    enabled: true
    extraMounts:
    - name: ca-certificates
      mountPath: /etc/ssl/certs
    searchNamespace: ALL
  plugins:
    enabled: true
    extraMounts:
    - name: ca-certificates
      mountPath: /etc/ssl/certs
    searchNamespace: ALL
