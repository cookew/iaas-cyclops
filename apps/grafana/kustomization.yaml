apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

resources:
- base/ceph-datasource.yaml
- base/docker-registry-dashboard.yaml
- base/grafana-external-image-objectbucketclaim.yaml
- base/grafana-keycloak-client.yaml
- base/grafana-pg-cluster.yaml
# - base/grafana-valkey-certificate.yaml
- base/haproxy-dashboard.yaml
- base/loki-datasource.yaml
- base/pyroscope-datasource.yaml
- base/tempo-datasource.yaml
- sealed-secrets/grafana-admin.yaml
- sealed-secrets/grafana-keycloak-client.yaml
- sealed-secrets/grafana-secret-key.yaml
- sealed-secrets/grafana-valkey-password.yaml

helmCharts:
- name: grafana
  namespace: grafana
  releaseName: grafana
  repo: https://grafana-community.github.io/helm-charts
  valuesFile: values.yaml
  version: 12.4.0
- name: valkey
  namespace: grafana
  releaseName: valkey
  repo: https://valkey.io/valkey-helm
  valuesFile: valkey-values.yaml
  version: 0.9.4
