apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

resources:
- base/ceph-datasource.yaml
- base/docker-registry-dashboard.yaml
- base/grafana-keycloak-client.yaml
- base/grafana-pg-cluster.yaml
- base/haproxy-dashboard.yaml
- base/loki-datasource.yaml
- base/pyroscope-datasource.yaml
- base/tempo-datasource.yaml
- sealed-secrets/grafana-admin.yaml
- sealed-secrets/grafana-keycloak-client.yaml

helmCharts:
- name: grafana
  namespace: grafana
  releaseName: grafana
  repo: https://grafana-community.github.io/helm-charts
  valuesFile: values.yaml
  version: 11.3.8
