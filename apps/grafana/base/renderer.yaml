# https://github.com/grafana/grafana-image-renderer/blob/master/devenv/k3s/grafana.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-renderer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-renderer
  replicas: 1 # production? use an HPA!
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-renderer
    spec:
      containers:
      - name: image-renderer
        image: grafana/grafana-image-renderer:latest
        ports:
        - containerPort: 8081
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: image-renderer
spec:
  selector:
    app.kubernetes.io/name: image-renderer
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
