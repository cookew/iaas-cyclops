---
apiVersion: user.keycloak.crossplane.io/v1alpha1
kind: Groups
metadata:
  name: super-users
spec:
  deletionPolicy: Delete
  forProvider:
    groupIdsSelector:
      matchLabels:
        keycloak/realm: iaas
        keycloak/group: admins
    realmIdRef:
      name: iaas
    userIdRef:
      name: william
  providerConfigRef:
    name: keycloak-provider-config
