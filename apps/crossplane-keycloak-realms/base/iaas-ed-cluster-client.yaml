apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: ed-cluster
spec:
  deletionPolicy: Delete
  forProvider:
    accessType: confidential
    clientAuthenticatorType: federated-jwt
    clientId: ed-cluster
    extraConfig:
      jwt.credential.certificate: 
      jwt.credential.issuer: cookes.io
      jwt.credential.sub: "system:serviceaccount:test:default"
    name: ed-cluster
    realmIdRef:
      name: iaas
    serviceAccountsEnabled: true
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: cookes-io-k8s-test-test
spec:
  deletionPolicy: Delete
  forProvider:
    accessType: confidential
    clientAuthenticatorType: federated-jwt
    clientId: cookes-io-k8s-test-test
    extraConfig:
      jwt.credential.issuer: cookes.io
      jwt.credential.sub: "system:serviceaccount:test:test"
    name: cookes-io-k8s-test-test
    realmIdRef:
      name: iaas
    serviceAccountsEnabled: true
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: ProtocolMapper
metadata:
  name: ed-cluster-role-mapper
spec:
  forProvider:
    clientIdRef:
      name: ed-cluster
    config:
      access.token.claim: "true"
      claim.name: client_roles
      introspection.token.claim: "true"
      jsonType.label: String
      multivalued: "true"
    name: role-mapper
    protocol: openid-connect
    protocolMapper: oidc-usermodel-client-role-mapper
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientServiceAccountRole
metadata:
  name: ed-cluster-kubernetes-admin-sa-role
spec:
  forProvider:
    clientIdRef:
      name: kubernetes
    realmIdRef:
      name: iaas
    roleRef:
      name: kubernetes-admin
    serviceAccountUserClientIdRef:
      name: ed-cluster
  providerConfigRef:
    name: keycloak-provider-config
