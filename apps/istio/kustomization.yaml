apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: istio-system

resources:
- base/kiali-keycloak-client.yaml
- sealed-secrets/istio-kiali-grafana.yaml
- sealed-secrets/istio-kiali-keycloak-client.yaml

helmCharts:
- name: base
  # includeCRDs: true
  namespace: istio-system
  releaseName: base
  repo: https://istio-release.storage.googleapis.com/charts
  # valuesFile: base-values.yaml
  # version:
- name: istiod
  # includeCRDs: true
  namespace: istio-system
  releaseName: istiod
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: istiod-values.yaml
  # version:
- name: istio-cni
  # includeCRDs: true
  namespace: istio-system
  releaseName: cni
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: cni-values.yaml
  # version:
- name: ztunnel
  # includeCRDs: true
  namespace: istio-system
  releaseName: ztunnel
  repo: https://istio-release.storage.googleapis.com/charts
  # valuesFile: ztunnel-values.yaml
  # version:
- name: kiali-server
  # includeCRDs: true
  namespace: istio-system
  releaseName: kiali-server
  repo: https://kiali.org/helm-charts
  valuesFile: kiali-values.yaml
  version: 2.22.0
