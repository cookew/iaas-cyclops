# https://github.com/open-webui/helm-charts/blob/main/charts/terminals/values.yaml

# -- Enable or disable the terminals subchart
enabled: false

existingSecret: terminals-api-key

networkPolicy:
  enabled: true
  operator:
    # -- Custom egress rules for the operator pod
    egress:
    - ports:
      - port: 53
        protocol: TCP
      - port: 53
        protocol: UDP
      to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchLabels:
            k8s-app: kube-dns
    - ports:
      - port: 6444
        protocol: TCP
      to:
      - ipBlock:
          cidr: 10.0.0.0/8
  orchestrator:
    # -- Custom egress rules for the orchestrator pod
    egress: []
    # -- Custom ingress rules for the orchestrator pod
    ingress: []
  terminalPodSelector:
    app.kubernetes.io/component: terminal
  terminals:
    # -- Custom egress rules for terminal pods
    egress: []
    # -- Custom ingress rules for terminal pods
    ingress: []

operator:
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: false  # upstream image runs as root; set true only with a non-root image
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    runAsNonRoot: true  # verify image supports non-root before enabling
    runAsUser: 65534
    fsGroup: 65534
  replicaCount: 2

orchestrator:
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: false  # upstream image runs as root; set true only with a non-root image
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  idleTimeoutMinutes: 30
  podSecurityContext:
    # runAsNonRoot: true  # verify image supports non-root before enabling
    runAsUser: 65534
    fsGroup: 65534
  replicaCount: 2
  service:
    containerPort: 8080
    port: 8080
    type: ClusterIP
  terminalImage: ghcr.io/open-webui/open-terminal:latest
  terminalImagePullPolicy: IfNotPresent

terminalDefaults:
  persistence:
    size: 1Gi
    storageClass: ceph-filesystem
