apiVersion: role.keycloak.crossplane.io/v1alpha1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    keycloak/realm: iaas
    keycloak/group-admins: ""
  name: argocd-admin
spec:
  deletionPolicy: Delete
  forProvider:
    clientIdRef:
      name: argocd
    name: argocd-admin
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: argocd-admins
spec:
  deletionPolicy: Delete
  forProvider:
    name: argocd-admins
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Roles
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: argocd-admin
spec:
  deletionPolicy: Delete
  forProvider:
    groupIdRef:
      name: argocd-admins
    realmIdRef:
      name: iaas
    roleIdsRefs:
    - name: argocd-admin
  providerConfigRef:
    name: keycloak-provider-config
