apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole
spec:
  deletionPolicy: Delete
  forProvider:
    # accessType: confidential
    baseUrl: /
    # clientAuthenticatorType: client-jwt
    clientId: guacamole
    clientSecretSecretRef:
      key: client-secret
      name: guacamole-keycloak-client
      namespace: guacamole
    # directAccessGrantsEnabled: true
    # extraConfig:
    #   attributes.token.endpoint.auth.signing.alg: RS256
    implicitFlowEnabled: true
    name: Guacamole
    # pkceCodeChallengeMethod: S256
    realmIdRef:
      name: iaas
    rootUrl: https://guacamole.apps.iaas.wcooke.me
    # standardFlowEnabled: true
    # validPostLogoutRedirectUris:
    # - /oauth2/sign_out
    validRedirectUris:
    - /*
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: ProtocolMapper
metadata:
  name: guacamole-role-mapper
spec:
  forProvider:
    clientIdRef:
      name: guacamole
    config:
      claim.name: client_roles
      client_id_for_role_mappings: guacamole
      id.token.claim: "true"
      jsonType.label: String
      multivalued: "true"
    name: role-mapper
    protocol: openid-connect
    protocolMapper: oidc-usermodel-client-role-mapper
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: role.keycloak.crossplane.io/v1alpha1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    keycloak/realm: iaas
    keycloak/group-admins: ""
  name: guacamole-admin
spec:
  deletionPolicy: Delete
  forProvider:
    clientIdRef:
      name: guacamole
    name: guacamole-admin
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole-admins
spec:
  deletionPolicy: Delete
  forProvider:
    name: guacamole-admins
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Roles
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole-admin
spec:
  deletionPolicy: Delete
  forProvider:
    groupIdRef:
      name: guacamole-admins
    realmIdRef:
      name: iaas
    roleIdsRefs:
    - name: guacamole-admin
  providerConfigRef:
    name: keycloak-provider-config
