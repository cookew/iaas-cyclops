apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole
spec:
  deletionPolicy: Delete
  forProvider:
    accessType: confidential
    baseUrl: /
    clientId: guacamole
    clientSecretSecretRef:
      key: client-secret
      name: guacamole-keycloak-client
      namespace: guacamole
    directAccessGrantsEnabled: true
    implicitFlowEnabled: true
    name: Guacamole
    # pkceCodeChallengeMethod: S256
    realmIdRef:
      name: iaas
    rootUrl: https://guacamole.apps.iaas.wcooke.me
    standardFlowEnabled: true
    # validPostLogoutRedirectUris:
    # - /oauth2/sign_out
    validRedirectUris:
    - /*
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: role.keycloak.crossplane.io/v1alpha1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    keycloak/realm: iaas
    keycloak/group-admins: ""
  name: guacamole-admin
spec:
  deletionPolicy: Delete
  forProvider:
    clientIdRef:
      name: guacamole
    name: guacamole-admin
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole-admins
spec:
  deletionPolicy: Delete
  forProvider:
    name: guacamole-admins
    realmIdRef:
      name: iaas
  providerConfigRef:
    name: keycloak-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Roles
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: guacamole-admin
spec:
  deletionPolicy: Delete
  forProvider:
    groupIdRef:
      name: guacamole-admins
    realmIdRef:
      name: iaas
    roleIdsRefs:
    - name: guacamole-admin
  providerConfigRef:
    name: keycloak-provider-config
