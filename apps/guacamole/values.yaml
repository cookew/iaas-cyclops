# https://github.com/helmforgedev/charts/blob/main/charts/guacamole/values.yaml

guacamole:
  # -- Web application context path (use "ROOT" to serve at /)
  contextPath: ROOT
  dbType: postgresql
  extraEnv:
  - name: EXTENSION_PRIORITY
    value: "*, openid"
  - name: RESTRICT_ENABLED
    value: "true"
  - name: RECORDING_ENABLED
    value: "true"
  - name: QUICKCONNECT_ENABLED
    value: "false"
  - name: POSTGRESQL_DEFAULT_MAX_CONNECTIONS
    value: "1"
  - name: POSTGRESQL_DEFAULT_MAX_CONNECTIONS_PER_USER
    value: "5"
  - name: POSTGRESQL_AUTO_CREATE_ACCOUNTS
    value: "false"
  - name: POSTGRESQL_ENFORCE_ACCESS_WINDOWS_FOR_ACTIVE_SESSIONS
    value: "true"
  - name: POSTGRESQL_USER_PASSWORD_MIN_AGE
    value: "1"
  - name: POSTGRESQL_USER_PASSWORD_MAX_AGE
    value: "90"
  - name: POSTGRESQL_USER_PASSWORD_HISTORY_SIZE
    value: "15"
  - name: POSTGRESQL_USER_PASSWORD_MIN_LENGTH
    value: "15"
  - name: POSTGRESQL_USER_PASSWORD_REQUIRE_MULTIPLE_CASE
    value: "true"
  - name: POSTGRESQL_USER_PASSWORD_REQUIRE_SYMBOL
    value: "true"
  - name: POSTGRESQL_USER_PASSWORD_REQUIRE_DIGIT
    value: "true"
  - name: POSTGRESQL_USER_PASSWORD_PROHIBIT_USERNAME
    value: "true"

proxy:
  # -- Enable Tomcat RemoteIpValve for reverse proxy
  enabled: true
  # -- Trusted proxy IP regex
  allowedIpsRegex: ""
  # -- Header for client IP
  ipHeader: X-Forwarded-For
  # -- Header for protocol
  protocolHeader: X-Forwarded-Proto

oidc:
  enabled: true
  authorizationEndpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/auth
  jwksEndpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/certs
  issuer: https://keycloak.apps.iaas.wcooke.me/realms/iaas
  clientId: guacamole
  # -- Redirect URI (auto-detected from ingress if empty)
  redirectUri: https://guacamole.apps.iaas.wcooke.me
  scope: openid email profile
  usernameClaim: preferred_username
  groupsClaim: client_roles
  allowedClockSkew: 30
  maxTokenValidity: 300

totp:
  enabled: false

database:
  type: postgresql
  external:
    host: guacamole-pg-cluster-rw.guacamole.svc
    port: 5432
    name: guacamole
    username: guacamole
    existingSecret: guacamole-pg-cluster-app
    existingSecretPasswordKey: password

initDb:
  # -- Run a Job to initialize the database schema on install
  enabled: true
  # -- Resources for the init job
  resources: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

ingress:
  enabled: true
  ingressClassName: cilium
  annotations:
    cert-manager.io/cluster-issuer: iaas-wcooke-me
    forecastle.stakater.com/appName: Guacamole
    forecastle.stakater.com/expose: "true"
    forecastle.stakater.com/group: Apps
    forecastle.stakater.com/icon: https://guacamole.apps.iaas.wcooke.me/images/guac-tricolor.svg
    forecastle.stakater.com/network-restricted: "true"
    forecastle.stakater.com/url: https://guacamole.apps.iaas.wcooke.me
  hosts:
  - host: guacamole.apps.iaas.wcooke.me
    paths:
      - path: /
        pathType: Prefix
  tls:
  - hosts:
      - guacamole.apps.iaas.wcooke.me
    secretName: guacamole-tls

resources: {}

podSecurityContext: {}

securityContext:
  fsGroup: 1000

affinity: {}

terminationGracePeriodSeconds: 30

backup:
  # -- Enable built-in backup CronJob (database dump + S3 upload)
  enabled: false
  # -- Backup schedule in Cron format
  schedule: "0 2 * * *"
  # -- Suspend backup execution
  suspend: false
  # -- CronJob concurrency policy
  concurrencyPolicy: Forbid
  # -- Successful job history retained
  successfulJobsHistoryLimit: 3
  # -- Failed job history retained
  failedJobsHistoryLimit: 3
  # -- Job backoff limit
  backoffLimit: 1
  # -- Prefix for backup archive names
  archivePrefix: guacamole
  # -- Resources for backup containers
  resources: {}
  images:
    uploader:
      repository: docker.io/helmforge/mc
      tag: "1.0.0"
      pullPolicy: IfNotPresent
    postgresql:
      repository: docker.io/library/postgres
      tag: "17.5-bookworm"
      pullPolicy: IfNotPresent
    mysql:
      repository: docker.io/library/mysql
      tag: "8.4"
      pullPolicy: IfNotPresent
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Optional prefix inside the bucket
    prefix: guacamole
    # -- Create bucket if not exists
    createBucketIfNotExists: true
    # -- Existing secret containing access-key and secret-key
    existingSecret: ""
    existingSecretAccessKeyKey: access-key
    existingSecretSecretKeyKey: secret-key
    # -- Inline access key
    accessKey: ""
    # -- Inline secret key
    secretKey: ""

extraVolumes:
- configMap:
    defaultMode: 420
    name: ca-all
  name: ca
- name: guacamole-recordings
  persistentVolumeClaim:
    claimName: guacamole-recordings

extraVolumeMounts:
- mountPath: /etc/ssl/certs/ca-certificates.crt
  name: ca
  readOnly: true
  subPath: ca-certificates.crt
- mountPath: /opt/java/openjdk/lib/security/cacerts
  name: ca
  readOnly: true
  subPath: ca-certificates.jks
- mountPath: /var/lib/guacamole/recordings
  name: guacamole-recordings

extraManifests: []

postgresql:
  enabled: false
