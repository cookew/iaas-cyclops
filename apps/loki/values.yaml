# https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml

backend:
   replicas: 0

chunksCache:
  persistence:
    enabled: true
    storageSize: 10G
    storageClass: cyclops-fs

compactor:
  # persistence:
  #   enabled: true
  #   claims:
  #     - name: data
  #       accessModes:
  #         - ReadWriteOnce
  #       size: 10Gi
  #       storageClass: cyclops-fs
  #   whenDeleted: Delete
  replicas: 1
  serviceAccount:
    automountServiceAccountToken: false

deploymentMode: Distributed

distributor:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 210m
    requests:
      cpu: 70m
  serviceAccount:
    automountServiceAccountToken: false

gateway:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  basicAuth:
    enabled: false
    # -- Existing basic auth secret to use. Must contain '.htpasswd'
    existingSecret: null
  ingress:
    enabled: false
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 30m
    requests:
      cpu: 10m
  service:
    port: 8080
  serviceAccount:
    create: false
  verboseLogging: false

global:
  automountServiceAccountToken: false
  extraArgs:
  - -config.expand-env=true
  # extraEnv:
  # - name: VALKEY_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: loki-valkey-password
  #       key: default
  extraEnvFrom:
  - configMapRef:
      name: loki-bucket
  - secretRef:
      name: loki-bucket
  serviceAccount:
    create: false

indexGateway:
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 2
  # persistence:
  #   enabled: true
  #   storageClass: cyclops-fs
  #   whenDeleted: Delete
  serviceAccount:
    automountServiceAccountToken: false

ingester:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  # persistence:
  #   enabled: true
  #   claims:
  #     - name: data
  #       accessModes:
  #         - ReadWriteOnce
  #       size: 10Gi
  #       storageClass: cyclops-fs
  #   whenDeleted: Delete
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 150m
    requests:
      cpu: 50m
  serviceAccount:
    automountServiceAccountToken: false
  zoneAwareReplication:
     enabled: false

loki:
  analytics:
    reporting_enabled: false
  auth_enabled: false
  compactor:
    compaction_interval: 10m
    delete_request_store: s3
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    retention_enabled: true
    working_directory: /tmp/loki/retention
  limits_config:
    # https://grafana.com/docs/loki/latest/configure/bp-configure/
    # Rate limits
    # ingestion_burst_size_mb: 20
    # ingestion_rate_mb: 10
    ingestion_rate_strategy: global
    # per_stream_rate_limit: 3MB
    # per_stream_rate_limit_burst: 15MB
    # Stream limits
    # max_global_streams_per_user: 10000
    max_streams_per_user: 0
    # Validation
    max_label_name_length: 1024
    # max_label_names_per_series: 15
    max_label_names_per_series: 150
    max_label_value_length: 2048
    max_line_size: 256KB
    max_line_size_truncate: false
    # Time constraints
    creation_grace_period: 10m
    reject_old_samples: true
    reject_old_samples_max_age: 168h  # 7 days
    unordered_writes: true

    # allow_structured_metadata: true # true
    # discover_log_levels: true # true
    ingestion_burst_size_mb: 100 # 6
    ingestion_rate_mb: 50 # 4
    # max_cache_freshness_per_query: 10m # 10m
    # max_chunks_per_query: 2000000 # 2000000
    # max_concurrent_tail_requests: 100 # 10
    # max_entries_limit_per_query: 5000 # 5000
    # max_global_streams_per_user: 5000 # 5000
    # max_label_name_length: 10240 # 1024
    # max_label_value_length: 10000
    # max_line_size: 512KB
    max_query_length: 0 # 30d1h
    # max_query_series: 500 # 500
    per_stream_rate_limit_burst: 200MB # 15MB
    per_stream_rate_limit: 100MB # 3MB
    query_timeout: 300s # 1m
    retention_period: 48h # 0s
    retention_stream:
    - period: 24h
      priority: 1
      selector: '{level="debug"}'
    - period: 24h
      priority: 2
      selector: '{detected_level="debug"}'
    - period: 24h
      priority: 3
      selector: '{priority_keyword="debug"}'
    - period: 24h
      priority: 4
      selector: '{priority="7"}'
    shard_streams:
      enabled: true
      # desired_rate: 2097152 # 2MiB
    # split_queries_by_interval: 15m
    # tsdb_max_query_parallelism: 64
    tsdb_precompute_chunks: true # false
    # volume_enabled: true # true

  # https://grafana.com/docs/loki/latest/configure/bp-configure/
  ingester:
    # Chunk settings
    chunk_idle_period: 30m
    chunk_target_size: 1572864  # 1.5 MB
    # chunk_target_size: 5242880 # 5 MB
    chunk_encoding: snappy
    max_chunk_age: 2h
    # WAL settings
    # wal:
    #   enabled: true
    #   dir: /loki/wal
    #   checkpoint_duration: 5m
    #   flush_on_shutdown: true

  pattern_ingester:
    enabled: true

  podDisruptionBudget:
    maxUnavailable: 1

  query_range:
    cache_instant_metric_results: true
    cache_results: true
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 1024
          ttl: 1h
        # redis:
        #   endpoint: valkey.loki.svc:6379
        #   expiration: 1h
        #   password: "${VALKEY_PASSWORD}"
        #   # tls_enabled: true
        #   # tls_insecure_skip_verify: true
        #   username: default

  revisionHistoryLimit: 0

  schemaConfig:
    configs:
    - from: 2026-01-01
      index:
        period: 24h
      object_store: s3
      schema: v13
      store: tsdb

  server:
    log_level: info

  storage:
    bucketNames:
      admin: loki
      chunks: loki
      ruler: loki
    object_store:
      storage_prefix: os
      type: s3
      s3:
        access_key_id: "${AWS_ACCESS_KEY_ID}"
        bucketnames: "${BUCKET_NAME}"
        endpoint: "${BUCKET_HOST}:${BUCKET_PORT}"
        http_config:
          insecure_skip_verify: true
        s3ForcePathStyle: true
        secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
    s3:
      access_key_id: "${AWS_ACCESS_KEY_ID}"
      bucketnames: "${BUCKET_NAME}"
      endpoint: "${BUCKET_HOST}:${BUCKET_PORT}"
      http_config:
        insecure_skip_verify: true
      s3ForcePathStyle: true
      secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
    type: s3

test:
  enabled: false
lokiCanary:
  enabled: false
  revisionHistoryLimit: 0

memcached:
  serviceAccount:
    create: false

monitoring:
  dashboards:
    enabled: true
  rules:
    enabled: true
  serviceMonitor:
    enabled: true

networkPolicy:
  enabled: true
  metrics:
    podSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-prometheus-stack
  ingress:
    podSelector: {}
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
  alertmanager:
    port: 9093
    podSelector:
      matchLabels:
        app.kubernetes.io/name: alertmanager
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-prometheus-stack
  # externalStorage:
  #   ports:
  #   - 443

overridesExporter:
  annotations: {}
  enabled: true
  labels: {}
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 2
  serviceAccount:
    automountServiceAccountToken: false

patternIngester:
  enabled: true
  persistence:
    claims:
    - name: data
      accessModes:
      - ReadWriteOnce
      size: 1Gi
      storageClass: cyclops-fs
    enabled: true
    enableStatefulSetAutoDeletePVC: true
    size: 1Gi
    storageClass: cyclops-fs
    whenDeleted: Delete
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 2
  serviceAccount:
    automountServiceAccountToken: false

querier:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 75m
    requests:
      cpu: 25m
  serviceAccount:
    automountServiceAccountToken: false

queryFrontend:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 45m
    requests:
      cpu: 15m

queryScheduler:
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 2
  serviceAccount:
    automountServiceAccountToken: false

read:
  replicas: 0

resultsCache:
  persistence:
    enabled: true
    storageClass: cyclops-fs
    storageSize: 10G

ruler:
  # persistence:
  #   enabled: true
  #   storageClass: cyclops-fs
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 2
  serviceAccount:
    automountServiceAccountToken: false
  sidecar: true

serviceAccount:
  create: false
  automountServiceAccountToken: false

write:
  replicas: 0
