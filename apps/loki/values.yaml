# https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml

backend:
   replicas: 0

chunksCache:
  persistence:
    enabled: true
    storageSize: 10G
    storageClass: ceph-filesystem

compactor:
  replicas: 1
  # persistence:
  #   enabled: true
  #   claims:
  #     - name: data
  #       accessModes:
  #         - ReadWriteOnce
  #       size: 10Gi
  #       storageClass: ceph-filesystem
  #   whenDeleted: Delete

deploymentMode: Distributed

distributor:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    maxUnavailable: 1

gateway:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  basicAuth:
    enabled: false
    # -- Existing basic auth secret to use. Must contain '.htpasswd'
    existingSecret: null
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: iaas-wcooke-me
      # forecastle.stakater.com/appName: Loki
      # forecastle.stakater.com/expose: "true"
      # forecastle.stakater.com/group: Observability
      # # forecastle.stakater.com/icon: https://loki.apps.iaas.wcooke.me/
      # forecastle.stakater.com/network-restricted: "true"
      # forecastle.stakater.com/url: https://loki.apps.iaas.wcooke.me/ui/
    enabled: false
    ingressClassName: cilium
    hosts:
    - host: loki.apps.iaas.wcooke.me
      paths:
      - path: /
        pathType: Prefix
    tls:
    - hosts:
      - loki.apps.iaas.wcooke.me
      secretName: loki-gateway-ingress-certs
  podDisruptionBudget:
    maxUnavailable: 1
  service:
    port: 8080

global:
  # extraEnv:
  # - name: VALKEY_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: loki-valkey-password
  #       key: default
  extraEnvFrom:
  - configMapRef:
      name: loki-bucket
  - secretRef:
      name: loki-bucket
  extraArgs:
  - -config.expand-env=true

indexGateway:
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 3
  # persistence:
  #   enabled: true
  #   storageClass: ceph-filesystem
  #   whenDeleted: Delete

ingester:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  # persistence:
  #   enabled: true
  #   claims:
  #     - name: data
  #       accessModes:
  #         - ReadWriteOnce
  #       size: 10Gi
  #       storageClass: ceph-filesystem
  #   whenDeleted: Delete
  podDisruptionBudget:
    maxUnavailable: 1
  zoneAwareReplication:
     enabled: false

loki:
  analytics:
    reporting_enabled: false
  auth_enabled: false
  compactor:
    compaction_interval: 10m
    delete_request_store: s3
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    retention_enabled: true
    working_directory: /tmp/loki/retention
  limits_config:
    # https://grafana.com/docs/loki/latest/configure/bp-configure/
    # Rate limits
    ingestion_burst_size_mb: 20
    ingestion_rate_mb: 10
    ingestion_rate_strategy: global
    # per_stream_rate_limit: 3MB
    # per_stream_rate_limit_burst: 15MB
    # Stream limits
    # max_global_streams_per_user: 10000
    max_streams_per_user: 0
    # Validation
    max_label_name_length: 1024
    # max_label_names_per_series: 15
    max_label_names_per_series: 150
    max_label_value_length: 2048
    max_line_size: 256KB
    max_line_size_truncate: false
    # Time constraints
    creation_grace_period: 10m
    reject_old_samples: true
    reject_old_samples_max_age: 168h  # 7 days
    unordered_writes: true

    allow_structured_metadata: true
    max_cache_freshness_per_query: 10m
    max_chunks_per_query: 20000000
    max_concurrent_tail_requests: 100
    max_entries_limit_per_query: 100000
    max_global_streams_per_user: 100000
    # max_label_name_length: 10240
    # max_label_names_per_series: 150
    # max_label_value_length: 10000
    # max_line_size: 512KB
    max_query_length: 0 # 0s
    max_query_series: 10000
    per_stream_rate_limit_burst: 150MB
    per_stream_rate_limit: 30MB
    query_timeout: 300s
    retention_period: 48h
    retention_stream:
    - period: 24h
      priority: 1
      selector: '{level="debug"}'
    - period: 24h
      priority: 2
      selector: '{detected_level="debug"}'
    split_queries_by_interval: 15m
    tsdb_precompute_chunks: true
    volume_enabled: true
    shard_streams:
      enabled: true
      # desired_rate: 2097152 # 2MiB

  # https://grafana.com/docs/loki/latest/configure/bp-configure/
  ingester:
    # Chunk settings
    chunk_idle_period: 30m
    chunk_target_size: 1572864  # 1.5 MB
    # chunk_target_size: 5242880 # 5 MB
    chunk_encoding: snappy
    max_chunk_age: 2h
    # WAL settings
    # wal:
    #   enabled: true
    #   dir: /loki/wal
    #   checkpoint_duration: 5m
    #   flush_on_shutdown: true

  pattern_ingester:
    enabled: true
  query_range:
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 500
          ttl: 1h
        # redis:
        #   endpoint: valkey.loki.svc:6379
        #   expiration: 1h
        #   password: "${VALKEY_PASSWORD}"
        #   # tls_enabled: true
        #   # tls_insecure_skip_verify: true
        #   username: default
    # cache_results: true
    # cache_instant_metric_results: true
  schemaConfig:
    configs:
    - from: 2026-01-01
      index:
        period: 24h
      object_store: s3
      schema: v13
      store: tsdb
  server:
    grpc_server_max_recv_msg_size: 104857600 # 100MB
    grpc_server_max_send_msg_size: 104857600 # 100MB
  storage:
    bucketNames:
      admin: loki
      chunks: loki
      ruler: loki
    type: s3
    s3:
      access_key_id: "${AWS_ACCESS_KEY_ID}"
      bucketnames: "${BUCKET_NAME}"
      endpoint: "${BUCKET_HOST}:${BUCKET_PORT}"
      http_config:
        insecure_skip_verify: true
      s3ForcePathStyle: true
      secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
    object_store:
      storage_prefix: os
      type: s3
      s3:
        access_key_id: "${AWS_ACCESS_KEY_ID}"
        bucketnames: "${BUCKET_NAME}"
        endpoint: "${BUCKET_HOST}:${BUCKET_PORT}"
        http_config:
          insecure_skip_verify: true
        s3ForcePathStyle: true
        secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
  ui:
    enabled: true
    gateway:
      enabled: true

# test:
#   enabled: false
# lokiCanary:
#   enabled: false

monitoring:
  dashboards:
    enabled: true
  rules:
    enabled: true
  serviceMonitor:
    enabled: true

overridesExporter:
  enabled: true
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 3

patternIngester:
  persistence:
    claims:
    - name: data
      accessModes:
      - ReadWriteOnce
      size: 1Gi
      storageClass: ceph-filesystem
    enabled: true
    enableStatefulSetAutoDeletePVC: true
    size: 1Gi
    storageClass: ceph-filesystem
    whenDeleted: Delete
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 3

querier:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    maxUnavailable: 1

queryFrontend:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
  podDisruptionBudget:
    maxUnavailable: 1

queryScheduler:
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 3

read:
   replicas: 0

resultsCache:
  persistence:
    enabled: true
    storageClass: ceph-filesystem
    storageSize: 10G

ruler:
  # persistence:
  #   enabled: true
  #   storageClass: ceph-filesystem
  podDisruptionBudget:
    maxUnavailable: 1
  replicas: 3
  sidecar: true

serviceAccount:
  create: false
  automountServiceAccountToken: false

write:
  replicas: 0
