# https://github.com/elastic/cloud-on-k8s/blob/main/deploy/eck-stack/values.yaml

eck-agent:
  enabled: false

eck-apm-server:
  enabled: false
  elasticsearchRefs:
  - name: eck-stack
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
  revisionHistoryLimit: 0

eck-autoops-agent-policy:
  enabled: false

eck-beats:
  enabled: false

eck-elasticsearch:
  # auth:
  #   disableElasticUser: true
  enabled: true
  fullnameOverride: eck-stack
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
  nodeSets:
  - config:
      node.roles:
      - master
      - remote_cluster_client
      # xpack.security.fips_mode.enabled: true
    count: 3
    name: master
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - data_hot
      - data_content
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: data-hot
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - data_warm
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: data-warm
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - data_cold
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: data-cold
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - data_frozen
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: data-frozen
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - ingest
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: ingest
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - ml
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: ml
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: cyclops-fs
  - config:
      node.roles:
      - transform
      - remote_cluster_client
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: transform
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: cyclops-fs
  - config:
      node.roles: []
      # xpack.security.fips_mode.enabled: true
    count: 2
    name: coordinating
    # podTemplate:
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: cyclops-fs

eck-fleet-server:
  enabled: true
  deployment:
    replicas: 2
    podTemplate:
      spec:
        serviceAccountName: fleet-server
        automountServiceAccountToken: true
  kibanaRef:
    name: eck-kibana
  elasticsearchRefs:
  - name: eck-stack
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
  revisionHistoryLimit: 0

eck-kibana:
  config:
    csp.strict: true
    server.securityResponseHeaders.disableEmbedding: true
    server.securityResponseHeaders.strictTransportSecurity: "max-age=31536000"
    server.ssl.certificate: /kibana-http-certs/tls.crt
    server.ssl.key: /kibana-http-certs/tls.key
    # xpack.security.authc.providers:
    #   oidc.keycloak:
    #     order: 0
    #     realm: keycloak
    #     accessAgreement:
    #       message: |
    #         * Ah ah ah, you didn't say the magic word!
    # basic.basic1:
    #   order: 1
    # xpack.security.authc.realms.oidc.keycloak:
    #   claims.groups: "<example-url>/claims/groups"
    #   claims.principal: sub
    #   op.authorization_endpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/auth
    #   op.endsession_endpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/logout
    #   op.issuer: https://keycloak.apps.iaas.wcooke.me/realms/iaas
    #   op.jwkset_path: oidc/jwkset.json
    #   op.token_endpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/token
    #   op.userinfo_endpoint: https://keycloak.apps.iaas.wcooke.me/realms/iaas/protocol/openid-connect/userinfo
    #   order: 2
    #   rp.client_id: eck-stack
    #   rp.post_logout_redirect_uri: https://kibana.apps.iaas.wcooke.me//security/logged_out
    #   rp.redirect_uri: https://kibana.apps.iaas.wcooke.me/api/security/oidc/callback
    #   rp.response_type: code
      # ssl.certificate_authorities: ["/oidc/company-ca.pem"]
    # xpack.security.fips_mode.enabled: true
    xpack.security.session.idleTimeout: "15m"
    xpack.security.session.lifespan: "1d"
    xpack.security.session.concurrentSessions:
      maxSessions: 5
  count: 2
  elasticsearchRef:
    name: eck-stack
  enabled: true
  # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-stack-monitoring.html
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: iaas-wcooke-me
      forecastle.stakater.com/appName: Kibana
      forecastle.stakater.com/expose: "true"
      forecastle.stakater.com/group: Apps
      forecastle.stakater.com/icon: data:image/svg+xml;base64,
      forecastle.stakater.com/network-restricted: "true"
      ingress.cilium.io/tls-passthrough: enabled
    className: cilium
    hosts:
      - host: kibana.apps.iaas.wcooke.me
        path: /
    labels: {}
    pathType: ImplementationSpecific
    tls:
      enabled: true
      secretName: kibana-ingress-tls
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
  podTemplate:
    spec:
      volumes:
      - name: kibana-http-certs
        secret:
          secretName: kibana-http-certificate
      containers:
      - name: kibana
        environment:
        - name: TELEMETRY_ENABLED
          value: "false"
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 0.5
            memory: 1Gi
        volumeMounts:
        - name: kibana-http-certs
          mountPath: /kibana-http-certs
          readOnly: true
  revisionHistoryLimit: 0
  secureSettings: []

eck-logstash:
  enabled: true
  elasticsearchRef:
    name: eck-stack
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring

eck-package-registry:
  enabled: true
  monitoring:
    logs:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
    metrics:
      elasticsearchRefs:
      - name: eck-monitoring
        namespace: eck-monitoring
