# https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy

alloy:
  configMap:
    content: |-
      logging {
        format = "json"
        level  = "info"
      }

      livedebugging {
        enabled = false
      }




      /////////////
      // Collect //
      /////////////

      // Syslog Receivers
      // Maybe replace with:
      //   https://grafana.com/docs/alloy/latest/reference/components/otelcol/otelcol.receiver.syslog/
      loki.source.syslog "local" {
        listener {
          address  = "0.0.0.0:5100"
          labels   = {component = "loki.source.syslog", protocol = "tcp"}
        }
        listener {
          address  = "0.0.0.0:5100"
          protocol = "udp"
          labels   = {component = "loki.source.syslog", protocol = "udp"}
        }
        forward_to = [loki.process.cleanup.receiver]
      }
      // End Syslog Receivers




      // OpenTelemetry Receivers
      remote.kubernetes.secret "client_credentials" {
        namespace = "alloy"
        name = "client-credentials"
        poll_frequency = "15s" // Default is 1m
      }
      otelcol.auth.basic "client" {
        password = remote.kubernetes.secret.client_credentials.data.password
        username = convert.nonsensitive(remote.kubernetes.secret.client_credentials.data.username)
      }
      otelcol.receiver.otlp "clients" {
        http {
          auth = otelcol.auth.basic.client.handler
          endpoint = "0.0.0.0:4400"
          /*
          tls {
            ca_file        = "/client-ca-cert/ca.crt"
            cert_file      = "/client-ca-cert/tls.crt"
            key_file       = "/client-ca-cert/tls.key"
            client_ca_file = "/client-ca-cert/ca.crt"
            min_version = "1.3"
            reload_interval = "15s" // Default is 0s (never)
          }
          */
        }
        /*
        grpc {
          auth = otelcol.auth.basic.client.handler
          endpoint = "0.0.0.0:4400"
          tls {
            ca_file        = "/client-ca-cert/ca.crt"
            cert_file      = "/client-ca-cert/tls.crt"
            key_file       = "/client-ca-cert/tls.key"
            client_ca_file = "/client-ca-cert/ca.crt"
            min_version = "1.3"
            reload_interval = "15s" // Default is 0s (never)
          }
        }
        */
        // include_metadata = true
        output {
          logs    = [loki.process.cleanup.receiver]
          metrics = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }
      // End OpenTelemetry Receivers




      ////////////////////////////
      // Post process and batch //
      ////////////////////////////

      loki.process "cleanup" {
        stage.label_drop {
          values = [ "exporter" ]
        }
        stage.luhn {}
        forward_to = [otelcol.receiver.loki.default.receiver]
      }
      otelcol.receiver.loki "default" {
        output {
          logs    = [otelcol.processor.batch.default.input]
          metrics = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }
      otelcol.processor.batch "default" {
        output {
          logs    = [otelcol.exporter.loki.loki.input]
          metrics = [otelcol.exporter.prometheus.prometheus.input]
          traces  = [otelcol.exporter.otlp.tempo.input]
        }
      }
      otelcol.exporter.prometheus "prometheus" {
        forward_to = [prometheus.remote_write.prometheus.receiver]
      }
      otelcol.exporter.loki "loki" {
        forward_to = [loki.write.loki.receiver]
      }



      //////////
      // Send //
      //////////

      loki.write "loki" {
        endpoint {
          url = "http://loki-distributor.loki.svc:3100/loki/api/v1/push"
        }
      }
      prometheus.remote_write "prometheus" {
        endpoint {
          url = "http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc:9090/api/v1/write"
        }
      }
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-distributor.tempo.svc:4317"
        }
      }




  clustering:
    enabled: true
    name: kube-cluster

  enableReporting: false

  envFrom: []

  extraArgs: []

  extraEnv: []

  extraPorts:
  - name: alloy-client
    port: 4400
    targetPort: 4400

  # listenAddr: 127.0.0.1

  listenScheme: HTTP

  mounts:
    extra:
    - mountPath: /storage
      name: storage
    - name: client-ca-cert
      mountPath: "/client-ca-cert"
      readOnly: true
    varlog: false

  resources:
    requests:
      cpu: 333m

  storagePath: /storage

controller:
  enableStatefulSetAutoDeletePVC: true

  extraAnnotations:
    reloader.stakater.com/auto: "true"

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 2

  replicas: 3

  revisionHistoryLimit: 0

  # tolerations:
  # - effect: NoSchedule
  #   key: node-role.kubernetes.io/control-plane
  # - effect: NoExecute
  #   key: node.kubernetes.io/not-ready
  #   operator: Exists
  # - effect: NoExecute
  #   key: node.kubernetes.io/unreachable
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/disk-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/memory-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/pid-pressure
  #   operator: Exists
  # - effect: NoSchedule
  #   key: node.kubernetes.io/unschedulable
  #   operator: Exists

  # Must be one of 'daemonset', 'deployment', or 'statefulset'.
  type: statefulset

  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-filesystem

  volumes:
    extra:
    - name: client-ca-cert
      secret:
        secretName: alloy-client-ca-cert

crds:
  create: false

rbac:
  # create: false
  namespaces:
  - alloy

serviceMonitor:
  enabled: true

# serviceAccount:
#   create: false
#   automountServiceAccountToken: false
